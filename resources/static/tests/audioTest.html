<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Encore - Dynamic Audio Demo</title>
    <style>
      body {
        font-family: sans-serif;
        background-color: #1a1a1a;
        color: #fff;
        text-align: center;
        padding-top: 50px;
      }
      #status {
        font-size: 2em;
        margin-bottom: 20px;
      }
      #startBtn {
        padding: 15px 30px;
        font-size: 1.2em;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Encore Dynamic Audio Demo</h1>
    <p>Click start to begin the loading sequence and hear the music.</p>
    <div id="status">Waiting to start...</div>
    <button id="startBtn">Start System</button>

    <script>
      // --- Configuration & Music-to-Time Calculation ---
      // Values derived from your FL Studio screenshot
      const BPM = 165;
      const BEATS_PER_BAR = 4;

      const SECONDS_PER_BEAT = 60 / BPM;
      const SECONDS_PER_BAR = SECONDS_PER_BEAT * BEATS_PER_BAR;

      // --- Define our song structure in BARS ---
      // This makes it easy to change if you edit the song
      const INTRO_ONCE_BARS = 8; // Bars 1-8
      const INTRO_LOOP_BARS = 8; // Bars 9-16
      const MAIN_LOOP_START_BAR = 17; // The "drop"
      const MAIN_LOOP_LENGTH_BARS = 16; // A reasonable guess for the main loop (bars 17-32)

      // --- Calculate the precise time in SECONDS ---
      // Intro loop timings
      const introLoopStartInSeconds = INTRO_ONCE_BARS * SECONDS_PER_BAR;
      const introLoopEndInSeconds =
        (INTRO_ONCE_BARS + INTRO_LOOP_BARS) * SECONDS_PER_BAR;
      const introLoopDurationInSeconds = INTRO_LOOP_BARS * SECONDS_PER_BAR;

      // Main BGM loop timings
      const mainLoopStartInSeconds =
        (MAIN_LOOP_START_BAR - 1) * SECONDS_PER_BAR;
      const mainLoopEndInSeconds =
        mainLoopStartInSeconds + MAIN_LOOP_LENGTH_BARS * SECONDS_PER_BAR;

      // --- Web Audio API Setup ---
      const audioContext = new (window.AudioContext ||
        window.webkitAudioContext)();
      let audioBuffer = null;
      let currentSource = null; // To keep track of the currently playing audio node
      let playbackStartTime = 0; // The context time when playback started

      // UI Elements
      const startBtn = document.getElementById("startBtn");
      const statusDiv = document.getElementById("status");

      // --- Core Functions ---

      /**
       * Loads an audio file from a URL into an AudioBuffer.
       * @param {string} url The path to the audio file.
       * @returns {Promise<AudioBuffer>}
       */
      async function loadAudio(url) {
        const response = await fetch(url);
        const arrayBuffer = await response.arrayBuffer();
        return audioContext.decodeAudioData(arrayBuffer);
      }

      /**
       * Plays the introductory looping music.
       */
      function playIntroLoop() {
        if (currentSource) {
          currentSource.stop();
        }
        currentSource = audioContext.createBufferSource();
        currentSource.buffer = audioBuffer;

        // Set the INTRO loop properties
        currentSource.loop = true;
        currentSource.loopStart = introLoopStartInSeconds;
        currentSource.loopEnd = introLoopEndInSeconds;

        currentSource.connect(audioContext.destination);

        playbackStartTime = audioContext.currentTime;
        currentSource.start(0); // Start playing immediately from the beginning

        statusDiv.textContent = "System is loading... (Playing Intro)";
        console.log(
          `Intro started. Looping from ${introLoopStartInSeconds.toFixed(
            2,
          )}s to ${introLoopEndInSeconds.toFixed(2)}s.`,
        );
      }

      /**
       * Schedules the seamless transition FROM the intro loop TO the main BGM loop.
       */
      function scheduleTransitionToMainLoop() {
        if (!currentSource) return;

        // --- This calculation logic remains the same, as it's perfect for finding the phrase boundary ---
        const timeSincePlaybackStart =
          audioContext.currentTime - playbackStartTime;
        const timeSinceLoopRegionStarted =
          timeSincePlaybackStart - introLoopStartInSeconds;
        if (timeSinceLoopRegionStarted < 0) {
          // We are still in the first 8 bars, the loop hasn't started yet.
          // The transition point is simply the end of the intro.
          console.log(
            "Loading finished before intro loop began. Scheduling for the drop.",
          );
          var transitionTime = playbackStartTime + introLoopEndInSeconds;
        } else {
          // We are inside the looping section. Find the end of the CURRENT loop.
          const loopsPassed = Math.floor(
            timeSinceLoopRegionStarted / introLoopDurationInSeconds,
          );
          var transitionTime =
            playbackStartTime +
            introLoopStartInSeconds +
            (loopsPassed + 1) * introLoopDurationInSeconds;
        }

        console.log(`Transition triggered!`);
        console.log(
          `Scheduling main BGM loop to start at audio context time: ${transitionTime.toFixed(
            2,
          )}s.`,
        );
        statusDiv.textContent =
          "Loading complete! Transitioning to main BGM on the next phrase...";

        // --- Here is the new logic ---

        // 1. Schedule the CURRENT intro source to stop at the precise transition time.
        currentSource.stop(transitionTime);

        // 2. Create a NEW source for the main BGM loop.
        const mainLoopSource = audioContext.createBufferSource();
        mainLoopSource.buffer = audioBuffer;
        mainLoopSource.connect(audioContext.destination);

        // 3. Set this new source to loop over the MAIN section of the song.
        mainLoopSource.loop = true;
        mainLoopSource.loopStart = mainLoopStartInSeconds;
        mainLoopSource.loopEnd = mainLoopEndInSeconds;

        // 4. Schedule it to start at the exact same time the old one stops.
        // The second argument `mainLoopStartInSeconds` is the "offset" - it tells the
        // buffer to start playing *from* that point in the audio file.
        mainLoopSource.start(transitionTime, mainLoopStartInSeconds);

        // 5. Update our `currentSource` to point to the new main BGM source.
        currentSource = mainLoopSource;

        // NO .onended handler! The music is now meant to play forever.
        console.log(
          `Main BGM loop is now active. Looping from ${mainLoopStartInSeconds.toFixed(
            2,
          )}s to ${mainLoopEndInSeconds.toFixed(2)}s.`,
        );

        // A small delay to update the UI text after the transition happens
        setTimeout(() => {
          statusDiv.textContent = "Encore Karaoke System Ready!";
        }, (transitionTime - audioContext.currentTime) * 1000 + 50);
      }

      // --- Event Listeners and Initialization ---

      startBtn.addEventListener("click", async () => {
        // Basic state management to prevent multiple clicks
        if (audioContext.state === "running") return;

        startBtn.disabled = true;
        startBtn.textContent = "Initializing...";

        // IMPORTANT: AudioContext must be resumed by a user gesture.
        if (audioContext.state === "suspended") {
          await audioContext.resume();
        }

        try {
          statusDiv.textContent = "Downloading soundtrack...";
          // Make sure this path is correct!
          audioBuffer = await loadAudio("../assets/audio/bgm.ogg");

          playIntroLoop();

          // Simulate your app's loading process
          console.log("Simulating a 5-second loading time...");
          setTimeout(() => {
            // Loading is complete! Trigger the transition to the main loop.
            scheduleTransitionToMainLoop();
          }, 35000);
        } catch (error) {
          console.error("Error loading or playing audio:", error);
          statusDiv.textContent = "Error loading audio.";
          startBtn.disabled = false;
          startBtn.textContent = "Start System";
        }
      });
    </script>
  </body>
</html>
